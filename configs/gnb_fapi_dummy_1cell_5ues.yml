# Dummy FAPI PHY — 1 cell, 5 simulated UEs with 10-slot RACH stagger.
# UE 0 RACH fires at slot 0, UE 4 at slot 40.
# No real hardware required.

cu_cp:
  request_pdu_session_timeout: 86400
  amf:
    no_core: true
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1

cell_cfg:
  dl_arfcn: 632628
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "00101"
  tac: 7
  pci: 1

fapi_dummy:
  enabled: true
  nof_ues: 5
  ue_creation_stagger_slots: 10

log:
  filename: /tmp/gnb_dummy_1cell_5ues.log
  all_level: info

pcap:
  mac_enable: false
  ngap_enable: false
