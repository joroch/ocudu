Manual Nightly:
  cron: "00 00 * * 0"
  cron_timezone: "Europe/Madrid"
  ref: refs/heads/main
  active: False # Nightly triggered from ocudu repo
  variables:
    - variable_type: env_var
      key: CI_DESCRIPTION
      value: "Nightly"
      raw: false
    - variable_type: env_var
      key: NOTIFY_SLACK
      value: "true"
      raw: false

# Release triggered from ocudu repo
Manual Release:
  cron: "00 00 * * 0"
  cron_timezone: "Europe/Madrid"
  ref: refs/heads/main
  active: False # Release triggered from ocudu repo
  variables:
    - variable_type: env_var
      key: CI_DESCRIPTION
      value: "Release"
      raw: false
    - variable_type: env_var
      key: NOTIFY_SLACK
      value: "false"
      raw: false
