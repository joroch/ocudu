include:
  - project: softwareradiosystems/ci/tools
    ref: "23"
    file: .gitlab/ci-shared/tools/docker.yml

stages:
  - compose
  - publish

################################################################################
# Docker Compose
################################################################################
docker compose:
  stage: compose
  image: docker:24.0.7-dind
  tags:
    - amd64-avx2
  timeout: 30 minutes
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
    KUBERNETES_CPU_REQUEST: ${SRS_CPU_LIMIT}
    KUBERNETES_CPU_LIMIT: ${SRS_CPU_LIMIT}
    KUBERNETES_MEMORY_REQUEST: ${SRS_MEMORY_LIMIT}
    KUBERNETES_MEMORY_LIMIT: ${SRS_MEMORY_LIMIT}
  rules:
    - if: $ON_MR
  before_script:
    - dockerd-entrypoint.sh &
    - |
      while ! ( nc -zv localhost 2376 2>&1 >/dev/null )
      do
          sleep 1
      done
    - docker network create --subnet=172.21.0.0/24 smo
  script:
    - docker compose -f docker/docker-compose.yml up -d
    - docker compose -f docker/docker-compose.yml logs -f &
    - |
      while ! ( nc -zv 172.21.0.13 5000 2>&1 >/dev/null )
      do
          sleep 1
      done
    - docker compose -f docker/docker-compose.yml down --remove-orphans
    - cat docker/netconf/o1-config.xml
    - cat docker/o1_adapter/config.yaml

yang validation:
  stage: compose
  image: ubuntu:22.04
  rules:
    - if: $ON_MR
  variables:
    DEBIAN_FRONTEND: noninteractive
    YANG_REPO_3GPP_TAG: Tag_Rel16_SA104
  script:
    - apt update && apt install -y --no-install-recommends git ca-certificates python3-pip
    - pip install pyang
    - ${CI_PROJECT_DIR}/docker/netconf/custom_yangs/download_yang_models.sh /opt/dev
    - |
      pyang --path /opt/dev/MnS/yang-models \
        ${CI_PROJECT_DIR}/docker/netconf/custom_yangs/*.yang /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-compression-factors.yang \
        /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-module-cap.yang \
        /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-wg4-features.yang \
        /opt/dev/modeling/data-model/yang/published/ietf/*.yang \
        -f sample-xml-skeleton --sample-xml-skeleton-defaults --sample-xml-skeleton-annotations > 3gpp_yang_tree.out
  artifacts:
    when: always
    paths:
      - 3gpp_yang_tree.out
    expire_in: 1 hour

################################################################################
# Publish
################################################################################

.publish:
  stage: publish
  rules:
    - if: $CI_DESCRIPTION =~ /Release/
    - if: $ON_DEFAULT_BRANCH
    - if: $ON_MR
      when: manual
      allow_failure: true
  interruptible: false
  retry: 2
  needs:
    - job: docker compose
      optional: true
      artifacts: false

.docker copy latest:
  extends: .docker copy
  variables:
    REGISTRY_URI: ""
    NAME: ""
    VERSION: ""
  script:
    - |
      skopeo copy \
        docker://${REGISTRY_URI}${CI_PROJECT_NAMESPACE#'softwareradiosystems'}/${CI_PROJECT_NAME}/${NAME}:${VERSION} \
        docker://${REGISTRY_URI}${CI_PROJECT_NAMESPACE#'softwareradiosystems'}/${CI_PROJECT_NAME}/${NAME}:latest

netconf image:
  extends:
    - .docker-builder
    - .publish
  variables: &netconf_image_variables
    REGISTRY_URI: ${GITLAB_REGISTRY_URI}
    NAME: netconf
    CONTEXT: ${CI_PROJECT_DIR}/docker/netconf
    VERSION: ${CI_COMMIT_SHORT_SHA}
    MODE: publish

netconf latest:
  extends:
    - .docker copy latest
    - .publish
  variables:
    <<: *netconf_image_variables
  needs:
    - job: netconf image
      artifacts: false

o1_adapter image:
  extends:
    - .docker-builder
    - .publish
  variables: &o1_adapter_image_variables
    REGISTRY_URI: ${GITLAB_REGISTRY_URI}
    NAME: o1_adapter
    CONTEXT: ${CI_PROJECT_DIR}/docker/o1_adapter
    VERSION: ${CI_COMMIT_SHORT_SHA}
    MODE: publish

o1_adapter latest:
  extends:
    - .docker copy latest
    - .publish
  variables:
    <<: *o1_adapter_image_variables
  needs:
    - job: o1_adapter image
      artifacts: false
